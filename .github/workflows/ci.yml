name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Frontend — Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hotel-web-fe

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hotel-web-fe/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  backend:
    name: Backend — Check, Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hotel-app-be

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo dependencies
        if: ${{ !env.ACT }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: hotel-app-be

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev pkg-config libssl-dev

      - name: Cargo check
        run: cargo check --all-features

      - name: Cargo clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Cargo build (release)
        run: cargo build --release
